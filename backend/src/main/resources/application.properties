spring.application.name=backend

# JPA default: in-memory H2 (works without local MySQL). For real MySQL use profile "mysql":
#   SPRING_PROFILES_ACTIVE=mysql   (see application-mysql.properties + backend/.env)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8081

# MongoDB — /api/resources (set in backend/.env as MONGODB_URI)
spring.data.mongodb.uri=${MONGODB_URI}

# OAuth2 Google login (Member 4 scope)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-google-client-secret}
app.frontend.oauth-success-url=${FRONTEND_OAUTH_SUCCESS_URL:http://localhost:5173/login}
