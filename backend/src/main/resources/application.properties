spring.application.name=backend

# If another app (e.g. Tomcat) uses 8080, set SERVER_PORT in backend/.env or override here.
server.port=${SERVER_PORT:8081}

# MongoDB — set MONGODB_URI in backend/.env (loaded in BackendApplication.main before Spring starts),
# or SMART_CAMPUS_ENV_FILE, or OS / IDE env vars.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017/smart_campus}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.error.include-message=always

spring.jackson.serialization.write-dates-as-timestamps=false
