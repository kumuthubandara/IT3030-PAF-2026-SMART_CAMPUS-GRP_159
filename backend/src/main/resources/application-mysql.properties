# Activated with: SPRING_PROFILES_ACTIVE=mysql
# Set SPRING_DATASOURCE_* in backend/.env to match your MySQL server.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_campus_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:smartcampus_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.h2.console.enabled=false
